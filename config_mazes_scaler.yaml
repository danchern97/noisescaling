dataset:
  name: mazes
  path: /home/wkosiuk/ARC/noisescaling/mazes-data

model:
  name: MazeAutoencoder
  injection_point: "mazes3"  # maze-specific injection naming
  args:
    latent_dim: 256
    base_channels: 64
    dropout: 0.3
  scaler:
    name: MazeStaticScaler
    args:
      n_transforms: 4
      layer_type: conv
      dim: 512  # will be overridden by train.py if needed
      dropout: 0.2
  aggregator:
    name: MeanAggregator
    args: {}
  losses:
    - name: maze_bce
      weight: 1.0

training:
  experiment_name: mazes_autoencoder_scaler_v1
  batch_size: 64
  num_workers: 4
  seed: 42
  epochs: 100
  learning_rate: 0.0005
  eval_interval: 50
  training_metrics: ["maze_iou"]
  validation_metrics: ["maze_iou"]
  device: cuda:0

