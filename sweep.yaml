program: train.py
method: bayes
metric:
  name: val/accuracy
  goal: maximize
command:
  - ${interpreter}
  - ${program}
  - --config
  - configs/sudoku_baseline.yaml
  - ${args}
parameters:
  training.learning_rate:
    distribution: uniform
    min: 0.0001
    max: 0.01
  training.batch_size:
    values: [256, 512, 1024, 2048]
  model.args.dropout:
    distribution: uniform
    min: 0.0
    max: 0.5