training:
  batch_size: 1024
  num_workers: 4
  batch_size: 256
  learning_rate: 0.0056
  epochs: 1
  eval_interval: 500
  device: "cuda:0"
  experiment_name: "sudoku-NF-cross-2"
  training_metrics: ["accuracy", "accuracy_sudoku"]
  validation_metrics: ["accuracy", "accuracy_sudoku"]
  seed: 42
  scaler_regime: "partial" # "partial" (only scaler and aggregator are trained) or "full" (all parameters are trained)
  
dataset:
  name: "sudoku"
  path: "./data/sudoku"

model:
  name: "SudokuCNN"
  injection_point: "3"
  losses:
    - {name: "sudoku_loss", weight: 1.0}
    - {name: "flow_nll_loss", weight: 0.01}
    # - {name: "orthonormality_loss", weight: 0.05}  # Uncomment if you want diversity regularization
  pretrained_path: "sudoku/sudoku_baseline/best_model.pt"
  pretrained_from_hf: "danchern/noisescaling"
  pretrained_version: baseline
  scaler:
    name: "SudokuNormalizingFlowScaler"
    args:
      n_reps: 2
      n_coupling_layers: 2
      hidden_dim: 64
      n_coupling_net_layers: 2
      H: 9
      W: 9
  aggregator:
    name: "CrossAttentionAggregator"
    args:
      aggregate_dim: 1