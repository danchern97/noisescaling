training:
  batch_size: 128
  num_workers: 4
  learning_rate: 0.001
  epochs: 1
  eval_interval: 12900
  device: "cpu"
  experiment_name: "sudoku-static-scaler-mean-aggregator-partial"
  training_metrics: ["accuracy", "accuracy_sudoku"]
  validation_metrics: ["accuracy", "accuracy_sudoku"]
  seed: 42
  scaler_regime: "partial" # "partial" (only scaler and aggregator are trained) or "full" (all parameters are trained)

dataset:
  name: "sudoku"
  path: "./data/sudoku"

model:
  name: "SudokuCNN"
  losses: [{"name": "sudoku_loss", "weight": 1.0}]
  #pretrained_path: "./models_cache/sudoku-baseline-new-arch/model_161500.pt"
  scaler:
    name: "SudokuStaticScaler"
    args:
      n_transforms: 2
  aggregator:
    name: "MeanAggregator"
    args:
      aggregate_dim: 1