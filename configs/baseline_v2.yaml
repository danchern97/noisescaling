training:
  batch_size: 256
  num_workers: 4
  learning_rate: 0.001
  epochs: 1
  eval_interval: 200
  device: "cuda:0"
  experiment_name: "sudoku-baseline-v2"
  training_metrics: ["accuracy", "accuracy_unknown_cells"]
  validation_metrics: ["accuracy", "accuracy_unknown_cells"]
  scaler_regime: "full" # "partial" (only scaler and aggregator are trained) or "full" (all parameters are trained)
  seed: 42
  logger: "sudoku_logger"
  max_samples_to_log: 16

dataset:
  name: "sudoku"
  path: "./data/sudoku"

model:
  name: "SudokuCNN"
  losses: [{"name": "cross_entropy_loss", "weight": 1.0}]
  args:
    dropout: 0.5
    n_mid_layers: 1
    n_dec_layers: 0