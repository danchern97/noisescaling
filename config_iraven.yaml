dataset:
  name: "iraven"
  path: "data/center_single"  # Path to the I-RAVEN dataset

model:
  name: "iraven"
  pretrained_path: null
  losses:
    - name: "cross_entropy"
      weight: 1.0

training:
  experiment_name: "iraven_baseline_test"
  device: "cpu"
  batch_size: 4
  learning_rate: 0.001
  epochs: 1
  seed: 42
  num_workers: 0
  eval_interval: 100
  scaler_regime: "full"  # Train all parameters
  training_metrics: ["accuracy"]
  validation_metrics: ["accuracy", "cross_entropy"] 