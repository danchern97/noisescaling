dataset:
  name: mazes
  path: /home/wkosiuk/ARC/noisescaling/mazes-data

model:
  name: MazeAutoencoder
  args:
    latent_dim: 256
  losses:
    - name: maze_bce
      weight: 1.0

training:
  experiment_name: mazes_autoencoder_v1
  batch_size: 64
  num_workers: 4
  seed: 42
  epochs: 100
  learning_rate: 0.0005
  eval_interval: 50
  training_metrics: ["maze_iou"]
  validation_metrics: ["maze_iou"]
  device: cuda:0

